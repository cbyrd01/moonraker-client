          $ref: '#/components/responses/Error'
  /server/extensions/request:
    post:
      summary: Call an extension method
      operationId: postServerExtensionsRequest
      tags:
      - Extensions
      description: |-
        This endpoint may be used to call a method on a connected agent.
        The request effectively relays a JSON-RPC request from a front end
        or other client to the agent.  Agents should document their
        available methods so Moonraker client developers can interact
        with them.
      x-jsonrpc-method: server.extensions.request
      x-transports:
      - http
      - websocket
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                agent:
                  type: string
                  description: The name of the registered agent hosting the requested
                    method.
                method:
                  type: string
                  description: The name of the method to call.
                arguments:
                  type: string
                  description: The arguments to send with the method.  This may be
                    an array containing positional arguments or an object containing
                    keyword arguments.  A value of `null` will omit arguments from
                    the request.
                  default: null
              required:
              - agent
              - method
            example:
              agent: moonagent
              method: moontest.hello_world
              arguments:
                argone: true
                argtwo: 9000
      responses:
        '200':
          description: Successful operation
        default:
          $ref: '#/components/responses/Error'
  /connection/send_event:
    post:
      summary: Send an agent event
      operationId: connection_send_event
      tags:
      - Extensions
      description: |-
        Sends a [JSON-RPC notification](./jsonrpc_notifications.md#agent-events)
        containing the supplied event info to all of Moonraker's persistent
        connections.

        **Note:** The `connected` and `disconnected` events are reserved for use
        by Moonraker and may not be sent from agents.

        **Note:** An agent may send an event without specifying the JSON-RPC `id` field.
        In this case Moonraker will not return a response.
      x-jsonrpc-method: connection.send_event
      x-transports:
      - http
      - websocket
      x-websocket-only: true
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                event:
                  type: string
                  description: The name of the event.  This may be any name other
                    than those reserved by Moonraker.
                data:
                  description: The data to send with the event. This can be any valid
                    JSON decodable value.  If omitted no data is sent with the event.
                  default: null
              required:
              - event
      responses:
        '200':
          description: Successful operation
        default:
          $ref: '#/components/responses/Error'
  /connection/register_remote_method:
    post:
      summary: Register a method with Klipper
      operationId: connection_register_remote_method
      tags:
      - Extensions
      description: |-
        Registers a "remote method" with Klipper that can be called
        from GCode Macros.

        **Note:** Methods registered by agents will persist until the agent disconnects.
        Upon connection it is only necessary that they register their desired
        methods once.

        **Note:** Remote methods called from Klipper never contain the JSON-RPC "id" field,
        as Klipper does not accept return values to remote methods.
      x-jsonrpc-method: connection.register_remote_method
      x-transports:
      - http
      - websocket
      x-websocket-only: true
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                method_name:
                  type: string
                  description: The name of the remote method to register with Klipper.  It
                    is recommended for agents to use a unique identifier, such as
                    a prefix, to prevent collisions with other remote methods registered
                    with Klipper.
              required:
              - method_name
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      jsonrpc:
                        type: string
                      method:
                        type: string
              example:
                result:
                  jsonrpc: '2.0'
                  method: monitor_alert_heated
        default:
          $ref: '#/components/responses/Error'
