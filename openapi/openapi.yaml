                        $ref: '#/components/schemas/JobHistoryTotals'
                        description: A [Job Totals](#job-history-totals-spec) object
                          reporting all totals prior to the reset.
                      last_auxiliary_totals:
                        type: array
                        items:
                          $ref: '#/components/schemas/JobAuxiliaryTotals'
                        description: An array of [Auxiliary Total](#job-auxiliary-totals-spec)
                          objects reporting totals prior to the reset.
              example:
                result:
                  last_totals:
                    total_jobs: 3
                    total_time: 11748.077333278954
                    total_print_time: 11348.794790096988
                    total_filament_used: 11615.718840001999
                    longest_job: 11665.191012736992
                    longest_print: 11348.794790096988
                  last_auxiliary_totals:
                  - provider: sensor hist_test
                    field: power_consumption
                    maximum: 4.119977
                    total: 4.119977
                  - provider: sensor hist_test
                    field: avg_current
                    maximum: 1.706872
                    total: null
                  - provider: sensor hist_test
                    field: filament
                    maximum: 19.08058495194607
                    total: 19.08058495194607
        default:
          $ref: '#/components/responses/Error'
  /server/history/job:
    get:
      summary: Get a single job
      operationId: getServerHistoryJob
      tags:
      - History
      x-jsonrpc-method: server.history.get_job
      x-transports:
      - http
      - websocket
      parameters:
      - name: uid
        in: query
        description: The unique identifier for the requested job history.
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      job:
                        $ref: '#/components/schemas/JobHistoryEntry'
                        description: The requested [Job History](#job-history-entry-spec
                          ) object.
        default:
          $ref: '#/components/responses/Error'
    delete:
      summary: Delete a job
      operationId: deleteServerHistoryJob
      tags:
      - History
      x-jsonrpc-method: server.history.delete_job
      x-transports:
      - http
      - websocket
      parameters:
      - name: uid
        in: query
        description: The unique identifier for the job entry to delete.
        required: true
        schema:
          type: string
      - name: all
        in: query
        description: When set to `true` all job history entries will be removed.
        required: false
        schema:
          type: boolean
          default: false
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      deleted_jobs:
                        type: array
                        items:
                          type: string
                        description: An array of unique IDs indicating the job entries
                          that were deleted.
              example:
                result:
                  deleted_jobs:
                  - '000000'
                  - '000001'
        default:
          $ref: '#/components/responses/Error'
  /server/notifiers/list:
    get:
      summary: List Notifiers
      operationId: getServerNotifiersList
      tags:
      - Integrations
      x-jsonrpc-method: server.notifiers.list
      x-transports:
      - http
      - websocket
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      notifiers:
                        type: array
                        items:
                          $ref: '#/components/schemas/NotifierStatus'
                        description: An array of [Notifier Status](#notifier-status-spec)
                          objects.
              example:
                result:
                  notifiers:
                  - name: print_start
                    url: tgram://{bottoken}/{ChatID}
                    events:
                    - started
                    body: Your printer started printing '{event_args[1].filename}'
                    title: null
                    attach: null
                  - name: print_complete
                    url: tgram://{bottoken}/{ChatID}
                    events:
                    - complete
