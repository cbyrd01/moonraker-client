      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      previous_size:
                        type: integer
                        description: Size in bytes of the database prior to compaction.
                      new_size:
                        type: integer
                        description: Size in bytes of the database after compaction.
              example:
                result:
                  previous_size: 139264
                  new_size: 122880
        default:
          $ref: '#/components/responses/Error'
  /server/database/backup:
    post:
      summary: Backup Database
      operationId: postServerDatabaseBackup
      tags:
      - Database
      description: |-
        Creates a backup of the current database.  The backup will be
        created in the `<data_path>/backup/database/<filename>`.

        This API cannot be requested when Klipper is printing.

        **Note:** The `{timespec}` of the default `filename` is in the following format:

        `<year><month><day>-<hour><minute><second>`
      x-jsonrpc-method: server.database.post_backup
      x-transports:
      - http
      - websocket
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                filename:
                  type: string
                  description: The file name of the saved backup file.
                  default: sqldb-backup-{timespec}.db
            example:
              filename: sql-db-backup.db
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      backup_path:
                        type: string
                        description: The complete absolute path where the backup was
                          saved.
              example:
                result:
                  backup_path: /home/test/printer_data/backup/database/sql-db-backup.db
        default:
          $ref: '#/components/responses/Error'
    delete:
      summary: Delete a backup
      operationId: deleteServerDatabaseBackup
      tags:
      - Database
      description: Deletes a previously backed up database.
      x-jsonrpc-method: server.database.delete_backup
      x-transports:
      - http
      - websocket
      parameters:
      - name: filename
        in: query
        description: The name of the backup file to delete. Must be a valid filename
          reported by the [database list endpoint](#list-database-info).
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      backup_path:
                        type: string
                        description: The complete absolute path where the backup was
                          removed.
              example:
                result:
                  backup_path: /home/test/printer_data/backup/database/sql-db-backup.db
        default:
          $ref: '#/components/responses/Error'
  /server/database/restore:
