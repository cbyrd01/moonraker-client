    post:
      summary: Add or update a webcam
      operationId: postServerWebcamsItem
      tags:
      - Webcams
      description: |-
        Adds a new webcam entry or updates an existing entry.  When updating
        an entry only the fields provided will be modified.

        **Note:** A webcam configured in `moonraker.conf` cannot be updated or
        overwritten using this API.

        **Note:** The default values in the parameter specification below apply to *new* webcam
        entries.  Existing entries to be updated only require the `uid` parameter,
        all other parameters default to their existing value.
      x-jsonrpc-method: server.webcams.post_item
      x-transports:
      - http
      - websocket
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                uid:
                  type: string
                  description: The unique ID of an existing Webcam Entry to modify.
                    If omitted the request will attempt to create a new Webcam Entry,
                    otherwise the existing entry will be updated.
                  default: null
                name:
                  type: string
                  description: The friendly name of the webcam.  Each webcam entry
                    must have a *unique* name.
                location:
                  type: string
                  description: A single word description of where the webcam is located
                    or what it is viewing.
                  default: printer
                icon:
                  type: string
                  description: Name of the icon associated with the webcam.
                  default: mdiWebcam
                enabled:
                  type: boolean
                  description: Set to `true` when the webcam is available, `false`
                    otherwise.
                  default: true
                service:
                  type: string
                  description: The name of the webcam streaming service used to operate
                    the webcam.
                  default: mjpegstreamer
                target_fps:
                  type: integer
                  description: Target frames per second when the printer is active.
                  default: 15
                target_fps_idle:
                  type: integer
                  description: Target frames per second when the printer is idle.
                  default: 5
                stream_url:
                  type: string
                  description: The url for the webcam's stream request.  This may
                    be a complete url or a url path relative to Moonraker's host.
                snapshot_url:
                  type: string
                  description: The url for the webcam's snapshot request. This may
                    be a complete url or a url path relative to Moonraker's host.
                  default: ''
                flip_horizontal:
                  type: boolean
                  description: A value of `true` indicates that the stream should
                    be flipped horizontally.
                  default: false
                flip_vertical:
                  type: boolean
                  description: A value of `true` indicates that the stream should
                    be flipped vertically.
                  default: false
                rotation:
                  type: integer
                  description: Indicates the amount of clockwise rotation, in degrees,
                    that should be applied to the stream. May be 0, 90, 180, or 270.
                  default: 0
                aspect_ratio:
                  type: string
                  description: Indicates the aspect ratio of the stream. The format
                    should be `W:H`, for example `4:3` or `16:9`.
                  default: '4:3'
                extra_data:
                  type: object
                  description: An object containing custom configuration added by
                    frontends.
                  default: '{}'
              required:
              - name
              - stream_url
            example:
              name: cam_name
              snapshot_url: http://printer.lan:8080/webcam?action=snapshot
              stream_url: http://printer.lan:8080/webcam?action=stream
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      webcam:
                        $ref: '#/components/schemas/WebcamEntry'
                        description: A [Webcam Entry](#webcam-entry-spec) object for
                          the new or updated webcam.
              example:
                result:
                  webcam:
                    name: TestCam
                    location: printer
                    service: mjpegstreamer
                    enabled: true
                    icon: mdiWebcam
                    target_fps: 15
                    target_fps_idle: 5
                    stream_url: /webcam/?action=stream
                    snapshot_url: /webcam/?action=snapshot
                    flip_horizontal: false
                    flip_vertical: false
                    rotation: 0
                    aspect_ratio: '4:3'
                    extra_data: {}
                    source: database
                    uid: 341778f9-387f-455b-8b69-ff68442d41d9
        default:
