        [subscribe endpoint](./printer.md#subscribe-to-printer-object-status-updates).
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                jsonrpc:
                  type: string
                  const: '2.0'
                method:
                  type: string
                  const: notify_status_update
                params:
                  type: array
                  prefixItems:
                  - type: object
                    description: An object containing changes to subscribed Klipper
                      objects.  Each key is the name of a printer object, each value
                      will be an object containing fields that have changed since
                      the last update.
                  - type: number
                    description: A timestamp indicating the time the subscription
                      data was sent.  This time is relative to the monotonic clock
                      used by Klipper.
                  minItems: 2
              required:
              - jsonrpc
              - method
            example:
              jsonrpc: '2.0'
              method: notify_status_update
              params:
              - gcode_move:
                  speed: 1500
                toolhead:
                  status: Ready
              - 578243.57824499
