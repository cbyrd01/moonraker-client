  /server/history/list:
    get:
      summary: Get job list
      operationId: getServerHistoryList
      tags:
      - History
      x-jsonrpc-method: server.history.list
      x-transports:
      - http
      - websocket
      parameters:
      - name: limit
        in: query
        description: Maximum number of job entries to return.
        required: false
        schema:
          type: integer
          default: 50
      - name: start
        in: query
        description: The record number indicating the first entry of the returned
          list.
        required: false
        schema:
          type: integer
          default: 0
      - name: before
        in: query
        description: A timestamp in unix time. When specified, the returned list will
          only contain entries created before this date.
        required: false
        schema:
          type: number
      - name: since
        in: query
        description: A timestamp in unix time. When specified, the returned list will
          only contain entries created after this date.
        required: false
        schema:
          type: number
      - name: order
        in: query
        description: The order of the list returned.  May be `asc` (ascending) or
          `desc` (descending).
        required: false
        schema:
          type: string
          default: desc
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      count:
                        type: integer
                        description: The number of entries returned by the query.
                      jobs:
                        type: array
                        items:
                          $ref: '#/components/schemas/JobHistoryEntry'
                        description: An array of [Job History](#job-history-entry-spec)
                          objects.
        default:
