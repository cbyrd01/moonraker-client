          $ref: '#/components/responses/Error'
  /server/analysis/estimate:
    post:
      summary: Perform a time analysis
      operationId: postServerAnalysisEstimate
      tags:
      - Integrations
      x-jsonrpc-method: server.analysis.estimate
      x-transports:
      - http
      - websocket
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                filename:
                  type: string
                  description: The path to the gcode file to perform a time estimate
                    on.  This should be a path relative to the `gcodes` root folder.
                estimator_config:
