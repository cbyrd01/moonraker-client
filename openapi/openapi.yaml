openapi: 3.1.0
info:
  title: Moonraker API
  description: Moonraker provides APIs over two protocols, HTTP and JSON-RPC. Most
    endpoints have corresponding APIs over both protocols. This specification documents
    the HTTP REST API with JSON-RPC method names included as extensions.
  version: 1.0.0
  license:
    name: GNU General Public License v3.0
    identifier: GPL-3.0
servers:
- url: http://{host}:{port}
  description: Moonraker Server
  variables:
    host:
      default: localhost
    port:
      default: '7125'
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-Api-Key
      description: API Key authentication
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JSON Web Token authentication
    OneshotToken:
      type: apiKey
      in: query
      name: token
      description: Oneshot token for single-use authentication
  schemas:
    Agent:
      type: object
      properties:
        name:
          type: string
          description: The name provided by the registered agent.
        version:
          type: string
          description: The version of the software reported by the agent.
        type:
          type: string
          description: The client type.  Will always be `agent`.
        url:
          type: string
          description: A url to the agent software's webpage.
      description: Agent Info
    AnnouncementEntry:
      type: object
      properties:
        entry_id:
          type: string
          description: A unique identifier for the announcement entry.
        url:
          type: string
          description: A url associated with the announcement.  This will link to
            a GitHub issue for announcements sourced from `moonlight`.
        title:
          type: string
          description: The title of the announcement.
        description:
          type: string
          description: A brief description of the announcement. For announcement's
            sourced from `moonlight` this will be the first paragraph of the associated
            GitHub issue.  Moonlight will truncate truncate descriptions over 512
            characters.
        priority:
          type: string
          description: The [priority](#announcement-priority-desc) of the announcement.
        date:
          type: string
          description: The announcement creation date in unix time.
        dismissed:
          type: boolean
          description: Set to `true` if the announcement has been dismissed.
        date_dismissed:
          type:
          - number
          - 'null'
          description: The date, in unix time, the announcement was last dismissed.
            Will be `null` if the announcement has not been dismissed.
        dismiss_wake:
          type:
          - number
          - 'null'
          description: The amount of time remaining, in seconds, before the entry's
            `dismissed` flag reverts to `true`.  Will be `null` if the announcement
            has not been dismissed or if the announcement was dismissed indefinitely.
        source:
          type: string
          description: The [source](#announcement-source-desc) of the announcement.
        feed:
          type: string
          description: The registered RSS feed the announcement belongs to. For announcements
            sourced internally this will typically be the name of the component that
            generated the announcement.
      description: Announcement Entry
    File:
      type: object
      properties:
        path:
          type: string
          description: The path of the file, relative to the requested root.
        modified:
          type: number
          description: The last modified date in Unix Time (seconds).
        size:
          type: integer
          description: The size of the file in bytes.
        permissions:
          type: string
          description: The available [permissions](#file-permissions-desc) of the
            file.
      description: File Info
    FileObject:
      type: object
      properties:
        filename:
          type: string
          description: The name of the configuration file.  This name is a path relative
            to the main configuration file's parent folder.
        sections:
          type: array
          items:
            type: string
          description: The config sections parsed from this file.
      description: File Object
    GcTrackingObj:
      type: object
      properties:
        message:
          type: string
          description: The GCode Message associated with ths object.
        time:
          type: number
          description: The time at which the message was received reported in Unix
            Time.
        type:
          type: string
          description: The message type.  Can be `command` or `response`.  Commands
            are only tracked when received through Moonraker's gcode API endpoint.
      description: GCode Tracking Object
    GcodeMetadata:
      type: object
      properties:
        size:
          type: integer
          description: The gcode file size in bytes.
        modified:
          type: number
          description: The last modified time in Unix Time (seconds).
        uuid:
          type: string
          description: A unique identifier for the metadata object.
        file_processors:
          type: array
          items:
            type: string
          description: An array of `File Processors` that have processed and modified
            the file.
        slicer:
          type: string
          description: The name of the slicer software used to slice the file.
        slicer_version:
          type: string
          description: The version of the slicer software.
        gcode_start_byte:
          type: integer
          description: The byte offset in the file where the first gcode command is
            detected.
        gcode_int_byte:
          type: integer
          description: The byte offset in the file where the last gcode command is
            detected.
        object_height:
          type: number
          description: The height (in mm) of the tallest object in the file.
        estimated_time:
          type: number
          description: The estimated time to complete the print, in seconds.
        nozzle_diameter:
          type: number
          description: The configured nozzle diameter, in mm.
        layer_height:
          type: number
          description: The configured layer height, in mm.
        first_layer_height:
          type: number
          description: The configured first layer height in mm.
        first_layer_extr_temp:
          type: number
          description: The configured first layer extruder temperature, in Celsius.
        first_layer_bed_temp:
          type: number
          description: The configured first layer bed temperature, in Celsius.
        chamber_temp:
          type: number
          description: The configured chamber temperature, in Celsius.
        filament_name:
          type: string
          description: The name(s) of the filaments contained in print.
        filament_colors:
          type: array
          items:
            type: string
          description: 'List of filament colors used in #RRGGBB format.'
        extruder_colors:
          type: array
          items:
            type: string
          description: List of  slicer defined extruder colors for the print.
        filament_temps:
          type: array
          items:
            type: integer
          description: List of base temperatures for filaments, in Celsius.
        filament_type:
          type: string
          description: 'The type(s) of filament used, ie: `PLA`.'
        filament_total:
          type: number
          description: The total length filament used in mm.
        filament_change_count:
          type: integer
          description: The number of filament changes in the print.
        filament_weight_total:
          type: number
          description: The total weight of filament used in grams.
        filament_weights:
          type: array
          items:
            type: number
          description: List of weights in grams used by each tool in the print.
        printer_vendor:
          type: string
          description: The vendor name of the associated printer.
        printer_model:
          type: string
          description: The model of the associated printer.
        printer_variant:
          type: string
          description: The variant of the associated printer.
        profile_version:
          type: string
          description: The version of the profile configured in the slicer.
        mmu_print:
          type: integer
          description: Identifies a multimaterial print with single extruder.
        referenced_tools:
          type: array
          items:
            type: integer
          description: List of tool numbers used in the print.
        thumbnails:
          type: array
          items:
            type: object
          description: A list of `Thumbnail Info` objects.
        job_id:
          type:
          - string
          - 'null'
          description: The last `history` job ID associated with the gcode. Will be
            `null` if no job has been associated with the file.
        print_start_time:
          type: number
          description: The most recent start time the gcode file was printed. Will
            be `null` if the file has yet to be printed.
        filename:
          type: string
          description: Path to the gcode file, relative to the `gcodes` root.
    JobAuxiliaryTotals:
      type: object
      properties:
        provider:
          type: string
          description: The component or extension that generated the auxiliary totals.
        field:
          type: string
          description: The corresponding `name` of the auxiliary field used to generate
            totals.
        maximum:
          type:
          - number
          - 'null'
          description: The maximum value observed across all prints. Will be `null`
            if the maximum is not available.
        total:
          type:
          - number
          - 'null'
          description: The accumulated total value across all prints. Will be `null`
            if the total is not available.
      description: Auxiliary Total
    JobHistoryAuxField:
      type: object
      properties:
        provider:
          type: string
          description: The component or extension that generated the auxiliary field.
        name:
          type: string
          description: A name identifying the field.
        description:
          type: string
          description: A brief description of the data in this entry.
        value:
          description: The value associated with the field.  Can be any valid JSON
            type.
        units:
          type:
          - string
          - 'null'
          description: The unit type associated with the value.  For example this
            would be `mm` for millimeters.  Can be `null` if no unit abbreviation
            is appropriate.
      description: Auxiliary Field
    JobHistoryEntry:
      type: object
      properties:
        job_id:
          type: string
          description: A unique ID for the entry.
        user:
          type:
          - string
          - 'null'
          description: 'The user that started the job.  Will be `null` if Moonraker
            cannot identify a user (ie: job) was started via Klipper''s display.'
        filename:
          type: string
          description: The path, relative to `gcodes` root, of the file associated
            with the job.
        exists:
          type: boolean
          description: A value of `true` indicates that the file associated with the
            job exists on disk and has not been modified.
        status:
          type: string
          description: The [job status](#job-history-status-desc) at the time of query.
        start_time:
          type: number
          description: A timestamp, in unix time, indicating when the job started.
        end_time:
          type:
          - number
          - 'null'
          description: A timestamp, in unix time, indicating when the job finished.  Will
            be `null` if the job is in progress or if Moonraker is interrupted prior
            to the job completion.
        print_duration:
          type: number
          description: 'The amount of time, in seconds, the job spent printing (ie:
            printer not idle).'
        total_duration:
          type: number
          description: The total amount of time, in seconds, the job took to print.  This
            includes time paused.
        filament_used:
          type: number
          description: The amount of filament (in mm) used during the job.
        metadata:
          type: object
          description: The [gcode metadata](./file_manager.md#gcode-metadata-spec)
            object associated with the job.  The `job_id` and `print_start_time` fields
            are removed from the metadata as they are redundant.
        auxiliary_data:
          type: array
          items:
            $ref: '#/components/schemas/JobHistoryAuxField'
          description: An array of [auxiliary field](#job-history-aux-field-spec)
            objects containing supplemental history data related to the job.
      description: Job History
    JobHistoryTotals:
      type: object
      properties:
        total_jobs:
          type: integer
          description: The total number of jobs tracked.
        total_time:
          type: number
          description: The total amount of job work time (in seconds) across all jobs,
            including time paused.
        total_print_time:
          type: number
          description: The total amount of time printing (in seconds) across all jobs.
        total_filament_used:
          type: number
          description: The total amount of filament used (in mm) across all jobs.
        longest_job:
          type: number
          description: The maximum time spent working on a single job, including time
            paused.
        longest_print:
          type: number
          description: The maximum time spent printing a single job.
        auxiliary_totals:
          type: array
          items:
            $ref: '#/components/schemas/JobAuxiliaryTotals'
          description: An array of [Auxiliary Total](#job-auxiliary-totals-spec) objects.
      description: Job Totals
    JobQueueStatusResponse:
      type: object
      properties:
        queued_jobs:
          type: array
          items:
            type: object
          description: An array of `Queued Job` objects.
        queue_state:
          type: string
          description: The current [state](#queue-state-desc) of the job queue.
    ListAnnouncements:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: '#/components/schemas/AnnouncementEntry'
          description: An array of [announcement entry](#announcement-entry-spec)
            objects. The array is sorted by date in descending order (newest to oldest).
        feeds:
          type: array
          items:
            type: string
          description: An array of RSS announcement feeds Moonraker is currently subscribed
            to.
    NotifierStatus:
      type: object
      properties:
        name:
          type: string
          description: The configured name of the notifier.
        url:
          type: string
          description: The notifier's destination url.
        events:
          type: array
          items:
            type: string
          description: An array that contains one or more [events](#notifier-event-desc)
            which will trigger the push notification.
        body:
          type:
          - string
          - 'null'
          description: The content to send in the body of the notification. Will be
            `null` if no body is configured.
        title:
          type:
          - string
          - 'null'
          description: The title of the notification. Will be `null` if no title is
            configured
        attach:
          type:
          - string
          - 'null'
          description: One or more attachments added to the notification. Multiple
            attachments are separated by newlines. Will be `null` if no attachment
            is configured.
      description: Notifier Status
    ObjectQueryResponse:
      type: object
      properties:
        eventtime:
          type: number
          description: The time at which the status was received, according Klipper's
            monotonic clock.
        status:
          type: object
          description: An object containing the current state of the requested printer
            objects.
    PowerDeviceStatus:
      type: object
      properties:
        device:
          type: string
          description: The configured name of the device.
        status:
          type: string
          description: The current [state](#power-state-desc) of the device.
        locked_while_printing:
          type: boolean
          description: When set to `true` the power device status may not be changed
            when Klipper is printing.
        type:
          type: string
          description: The [Device Type](#power-type-desc) of the device.
      description: Power Device Status
    PrintStats:
      type: object
      properties:
        print_duration:
          type: number
          description: Time spent printing the current job in seconds. Does not include
            time paused.
        total_duration:
          type: number
          description: Total job duration in seconds.
        filament_used:
          type: number
          description: Amount of filament used for the current job in mm.
        filename:
          type: string
          description: File path of the current job, relative to the `gcodes` root.
        state:
          type: string
          description: The current job [state](#print-stats-state-desc).
        message:
          type: string
          description: A status message set by Klipper.  Will be an empty string if
            no message is set.
        info:
          type: object
          description: A `Print Stats Supplemental Info` object.
      description: Print Stats
    ProcStatsResponse:
      type: object
      properties:
        moonraker_stats:
          type: array
          items:
            type: object
          description: An array of `Moonraker Stats` objects.  The array is a FIFO
            queue, where the first index is the oldest sample. Moonraker process stats
            are sampled roughly every second. The maximum size of the queue is 30
            samples.
        throttled_state:
          type:
          - object
          - 'null'
          description: An `Throttled State` object containing details about the CPU's
            throttled state.  This information is only available on Raspberry Pi hosts,
            on other hardware this value will be `null`.
        cpu_temp:
          type:
          - number
          - 'null'
          description: The current CPU temperature.  Will be `null` if the temperature
            data is unavailable.
        network:
          type: object
          description: A `Network Usage` object containing detailed network usage
            data.  Will be an empty object if this information is unavailable.
        system_cpu_usage:
          type: object
          description: A `CPU Usage` object containing detailed CPU usage data. Will
            be an empty object if this information is unavailable.
        system_memory:
          type: object
          description: A `Memory Usage` object containing detailed memory usage data.  Will
            be an empty object if this information is unavailable.
        system_uptime:
          type: number
          description: The time elapsed, in seconds, since system boot.
        websocket_connections:
          type: integer
          description: The current number of open websocket connections.
    Root:
      type: object
      properties:
        name:
          type: string
          description: The name of the root node for the requested directory.
        permissions:
          type: string
          description: The available [permissions](#file-permissions-desc) of the
            root node.
      description: Root Info
    SensorMeasurements:
      type: object
      properties:
        '*param_name*':
          type: array
          items:
            type: string
          description: An array of decimal numbers containing all stored measurements
            for the named parameter. There may be multiple items in this object, where
            they keys are parameter names.
      description: Sensor Measurements
    SensorObj:
      type: object
      properties:
        temperatures:
          type: array
          items:
            type:
            - number
            - 'null'
          description: Contains the history of temperature measurements of this sensor.
            If the sensor is a `temperature monitor` values may be `null`.  A `null`
            value indicates that the sensor recorded no measurement at that time.
        targets:
          type: array
          items:
            type: number
          description: Contains the history of temperature targets for heaters.
        speeds:
          type: array
          items:
            type: number
          description: Contains a history of `speeds` for fans.  This value should
            be between 0 and 1 indicating the pwm duty cycle.
        powers:
          type: array
          items:
            type: number
          description: Contains a history fof `powers` for heaters.  This value should
            be between 0 and 1 indicating the pwm duty cycle.
      description: Sensor Object
    SensorStatus:
      type: object
      properties:
        id:
          type: string
          description: The sensor's configured ID.
        friendly_name:
          type: string
          description: The sensor's configured friendly name.
        type:
          type: string
          description: The sensor's configured type.  Currently only `mqtt` types
            are supported.
        values:
          type: object
          description: A `Sensor Values` object reporting the most recent values measured
            by the sensor.
        parameter_info:
          type: array
          items:
            type: object
          description: An array of `Parameter Info` objects.  Only included with `extended`
            responses.
        history_fields:
          type: array
          items:
            type: object
          description: An array of `History Field` objects.  Only reported with `extended`
            responses.  Will be an empty list if no history fields are configured
            for the sensor.
      description: Sensor Status
    Sys:
      type: object
      properties:
        python:
          type: object
          description: A `Python Info` object containing details about the Python
            interpreter.
        cpu_info:
          type: object
          description: A `CPU Info` object containing details about the host CPU.
        sd_info:
          type: object
          description: An `SDCard Info` object containing data about the host SD Card.
            If no SD Card is detected this object will be empty.
        distribution:
          type: object
          description: A `Distribution` object containing details about the host Linux
            Distribution.
        virtualization:
          type: object
          description: A `Virtualization` object containing virtualization status
            of the environment running Moonraker.
        network:
          type: object
          description: A `Network Info` object containing information about the system's
            current network state.
        canbus:
          type: object
          description: A `Canbus Info` object containing information about CAN interfaces
            detected on the system.
        provider:
          type: string
          description: The currently configured system provider type. Expand for a
            list of available providers.
        available_services:
          type: array
          items:
            type: string
          description: A list of detected services Moonraker is authorized to manage.
        service_state:
          type: object
          description: A `Service State` object containing information about services
            Moonraker is monitoring.  This will be an empty object if no services
            are being monitored.
        instance_ids:
          type: object
          description: An `Instance ID` object matching known application names to
            their detected system unit name.
      description: System Info
    ThumbnailDetails:
      type: object
      properties:
        width:
          type: integer
          description: The width of the thumbnail in pixels.
        height:
          type: integer
          description: The height of the thumbnail in pixels.
        size:
          type: integer
          description: The size of the thumbnail in bytes.
        thumbnail_path:
          type: string
          description: The path of the thumbnail, relative to the `gcodes` root.
      description: Thumbnail Details
    UpdateStatus:
      type: object
      properties:
        busy:
          type: boolean
          description: Set to `true` if an update is currently in progress.
        github_rate_limit:
          type: integer
          description: The maximum number of GitHub API requests allowed. An unauthenticated
            user is typically allowed 60 requests per hour.
        github_requests_remaining:
          type: integer
          description: The number of GitHub API requests remaining until the reset
            time is reached.
        github_limit_reset_time:
          type: integer
          description: The time when the rate limit will reset, reported in unix time.
        version_info:
          type: object
          description: A `Version Info` object containing the update status for each
            configured software updater.
    Version2Success:
      type: object
      properties:
        response:
          type:
          - object
          - 'null'
          description: On success will be an object containing the response received
            from Spoolman.  Will be `null` if an error is received.
        error:
          type:
          - object
          - 'null'
          description: On error will be a `Spoolman Error` object. Will be `null`
            on successful requests.
      description: Version 2 response
    WebcamEntry:
      type: object
      properties:
        name:
          type: string
          description: Friendly name of the webcam.
        location:
          type: string
          description: A single word description of where the webcam is located or
            what it is viewing.
        service:
          type: string
          description: The name of the webcam streaming service used to operate the
            webcam.
        enabled:
          type: boolean
          description: Set to `true` when the webcam is available, `false` otherwise.
        icon:
          type: string
          description: Name of the icon associated with the webcam.
        target_fps:
          type: integer
          description: Target frames per second when the printer is active.
        target_fps_idle:
          type: integer
          description: Target frames per second when the printer is idle.
        stream_url:
          type: string
          description: The url for the webcam's stream request.  This may be a complete
            url, or a url path relative to Moonraker's host.
        snapshot_url:
          type: string
          description: The url for the webcam's snapshot request. This may be a complete
            url, or a url path relative to Moonraker's host.  If the webcam does not
            support a snapshot url this will be an empty string.
        flip_horizontal:
          type: boolean
          description: A value of `true` indicates that the stream should be flipped
            horizontally.
        flip_vertical:
          type: boolean
          description: A value of `true` indicates that the stream should be flipped
            vertically.
        rotation:
          type: integer
          description: Indicates the amount of clockwise rotation, in degrees, that
            should be applied to the stream. May be 0, 90, 180, or 270.
        aspect_ratio:
          type: string
          description: Indicates the aspect ratio of the stream. The format should
            be `W:H`, for example `4:3` or `16:9`.
        extra_data:
          type: object
          description: An object containing custom configuration added by frontends.
        source:
          type: string
          description: The [configuration source](#webcam-configuration-source-desc)
            of the webcam entry.
        uid:
          type: string
          description: A unique identifier assigned to the webcam entry.
      description: Webcam Entry
    WledStripStatus:
      type: object
      properties:
        strip:
          type: string
          description: The configured name of the strip.
        status:
          type: string
          description: The current state of the WLED strip. Will be `on` if the strip
            is enabled or `off` if the strip is disabled.
        chain_count:
          type: integer
          description: The number of LEDs configured on the chain.
        preset:
          type: integer
          description: The numbered preset. Will be -1 if no preset is selected.
        brightness:
          type: integer
          description: The brightness value set by Moonraker. Will be -1 if Moonraker
            has not set this value.
        intensity:
          type: integer
          description: The intensity value set by Moonraker. Will be -1 if Moonraker
            has not set this value.
        speed:
          type: integer
          description: The speed value set by Moonraker. Will be -1 if Moonraker has
            not set this value.
        error:
          type:
          - string
          - 'null'
          description: A message describing last error returned from an attempted  WLED
            command.  Will be `null` if no error is returned.
      description: WLED Strip Status
    ErrorResponse:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: integer
            message:
              type: string
          required:
          - code
          - message
      required:
      - error
    ResultOk:
      type: object
      properties:
        result:
          type: string
      description: Standard success response wrapping a string result (typically "ok").
  responses:
    Error:
      description: An error occurred processing the request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ResultOk:
      description: Successful operation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ResultOk'
          example:
            result: ok
security:
- ApiKeyAuth: []
- BearerAuth: []
paths:
  /server/announcements/list:
    get:
      summary: List announcements
      operationId: getServerAnnouncementsList
      tags:
      - Announcements
      description: Retrieves a list of current announcements.
