  /server/announcements/dismiss:
    post:
      summary: Dismiss an announcement
      operationId: postServerAnnouncementsDismiss
      tags:
      - Announcements
      description: |-
        Sets the dismiss flag of an announcement to `true`.

        **Note:** The `entry_id` typically contains forward slashes. Remember to escape this value
        if including it in the query string of an HTTP request.
      x-jsonrpc-method: server.announcements.dismiss
      x-transports:
      - http
      - websocket
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                entry_id:
                  type: string
                  description: The entry ID of the announcement to dismiss.
                wake_time:
                  type:
                  - number
                  - 'null'
                  description: A time, in seconds, after which the entry's `dismiss`
                    flag will revert to `true`.  When set to `null` the flag will
                    remain `false` indefinitely.
                  default: null
              required:
              - entry_id
            example:
              entry_id: arksine/moonlight/issue/1
              wake_time: 600
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      entry_id:
                        type: string
                        description: The entry ID of the dismissed announcement entry.
              example:
                result:
                  entry_id: arksine/moonlight/issue/1
        default:
          $ref: '#/components/responses/Error'
