          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      config:
                        type: object
                        description: An object containing the full Moonraker configuration.  Each
                          field of this object is a section name.  The value for each
