                  type: integer
                  description: Changes the `intensity` value of the current preset.  The
                    permitted range is 0-255.  This setting is ignored if no preset
                    is active.
                  default: null
                speed:
                  type: integer
                  description: Changes the `speed` value of the current preset.  The
                    permitted range is 0-255.  This setting is ignored if no preset
                    is active.
                  default: null
              required:
