  /server/files/directory:
    get:
      summary: Get directory information
      operationId: getServerFilesDirectory
      tags:
      - File Manager
      description: |-
        Returns a list of files and subdirectories given a supplied path.
        Unlike `/server/files/list`, this command does not walk through
        subdirectories.  This request will return all files in a directory,
        including files in the `gcodes` root that do not have a valid gcode
        extension.
      x-jsonrpc-method: server.files.get_directory
      x-transports:
      - http
      - websocket
      parameters:
      - name: path
        in: query
        description: Path to the directory.  The first part must be a registered root.
        required: false
        schema:
          type: string
          default: gcodes
      - name: extended
        in: query
        description: When set to `true` metadata will be included in the response
          for gcode file.
        required: false
        schema:
          type: boolean
          default: false
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      dirs:
                        type: array
                        items:
                          type: object
                        description: An array of `Directory Info` objects.  Will be
                          empty if no sub-directories are found.
                      files:
                        type: array
                        items:
                          type: object
                        description: An array of `File Info` objects.  Will be empty
                          if no files are found.
                      disk_usage:
                        type: object
                        description: A `Disk Usage` object. This provides disk usage
                          details about the underlying storage media containing the
                          requested directory.
                      root_info:
                        type: object
                        description: A `Root Info` object. Provides details about
                          the directory's root parent.
              example:
                result:
                  dirs:
                  - modified: 1615768162.0412788
                    size: 4096
                    permissions: rw
                    dirname: test
                  - modified: 1613569827.489749
                    size: 4096
                    permissions: rw
                    dirname: Cura
                  - modified: 1615767459.6265886
                    size: 4096
                    permissions: rw
                    dirname: thumbs
                  files:
                  - modified: 1615578004.9639666
                    size: 7300692
                    permissions: rw
                    filename: Funnel_0.2mm_PLA_Ender2_2h4m.gcode
                  - modified: 1589156863.9726968
                    size: 4214831
                    permissions: rw
                    filename: CE2_Pi3_A+_CaseLID.gcode
                  - modified: 1615030592.7722695
                    size: 2388774
                    permissions: rw
                    filename: CE2_calicat.gcode
                  disk_usage:
                    total: 7522213888
                    used: 4280369152
                    free: 2903625728
                  root_info:
                    name: gcodes
                    permissions: rw
        default:
          $ref: '#/components/responses/Error'
    post:
      summary: Create directory
      operationId: postServerFilesDirectory
      tags:
      - File Manager
      description: Creates a directory at the specified path.
      x-jsonrpc-method: server.files.post_directory
      x-transports:
      - http
      - websocket
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                path:
                  type: string
                  description: The path to the directory to create, including its
                    `root`. Note that the parent directory must exist.
              required:
              - path
            example:
              path: gcodes/my_new_dir
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      item:
                        type: object
                        description: An `Item Details` object describing the directory
                          created.
                      action:
                        type: string
                        description: A description of the action taken by the host.  Will
                          always be `create_dir` for this request.
              example:
                result:
                  item:
                    path: my_new_dir
                    root: gcodes
                    modified: 1676983427.3732708
                    size: 4096
                    permissions: rw
                  action: create_dir
        default:
          $ref: '#/components/responses/Error'
    delete:
      summary: Delete directory
      operationId: deleteServerFilesDirectory
      tags:
      - File Manager
      description: Deletes a directory at the specified path.
      x-jsonrpc-method: server.files.delete_directory
      x-transports:
      - http
      - websocket
      parameters:
      - name: path
        in: query
        description: The path to the directory to delete, including its `root`. Note
          that the directory must be empty if `force` is `false`
        required: true
        schema:
          type: string
      - name: force
        in: query
        description: When set to `true` the directory and all of its contents will
          be deleted.
        required: false
        schema:
          type: boolean
          default: false
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      item:
                        type: object
                        description: An `Item Details` object describing the directory
                          deleted.
                      action:
                        type: string
                        description: A description of the action taken by the host.  Will
                          always be `delete_dir` for this request.
              example:
                result:
                  item:
                    path: my_subdir
                    root: gcodes
                    modified: 0
                    size: 0
                    permissions: ''
                  action: delete_dir
        default:
          $ref: '#/components/responses/Error'
  /server/files/move:
    post:
      summary: Move a file or directory
      operationId: postServerFilesMove
      tags:
      - File Manager
      description: |-
        Moves a file or directory from one location to another. The following
        conditions must be met for a move successful move:

        - The source item must exist.
        - The user that owns the Moonraker process must have the appropriate
          file permissions.
        - Neither the source nor destination can be loaded by Klipper's `virtual_sdcard`.
          If the source is a directory, it must not contain a file loaded by the
          `virtual_sdcard`.

        When specifying the `source` and `dest`, the `root` directory should be
        prefixed. Currently the only supported roots for `dest` are `gcodes`"
        and `config`".

        This endpoint may also be used to rename a file or directory.   Be aware that an
        attempt to rename a directory to a directory that exists with the same name will
        *move* the source directory into the destination directory.  Also be aware
        that renaming a file to a file that already exists will overwrite the existing
        file.
      x-jsonrpc-method: server.files.move
      x-transports:
      - http
      - websocket
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                source:
                  type: string
                  description: The source file or directory to move. This is a path
                    that must start with the root node.
                dest:
                  type: string
                  description: The destination path.  The path must start with the
                    root node.
              required:
              - source
              - dest
            example:
              source: gcodes/orig_dir/my_file.gcode
              dest: gcodes/new_dir/my_file.gcode
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      item:
                        type: object
                        description: A `Destination Item` object.
                      source_item:
                        type: object
                        description: A `Source Item` object.
                      action:
                        type: string
                        description: A description of the action taken.  Will be `move_file`
                          if a file was moved or `move_dir` if a directory was moved.
              example:
                result:
                  item:
                    root: gcodes
                    path: subdir/my_file.gcode
                    modified: 1676940082.8595376
                    size: 384096
                    permissions: rw
                  source_item:
                    path: testdir/my_file.gcode
                    root: gcodes
                  action: move_file
        default:
          $ref: '#/components/responses/Error'
  /server/files/copy:
    post:
      summary: Copy a file or directory
      operationId: postServerFilesCopy
      tags:
      - File Manager
      description: |-
        Copies a file or directory from one location to another.  A successful copy has
        the same prerequisites as a move with one exception, a copy may complete if the
        source file or directory is loaded by the `virtual_sdcard`.
      x-jsonrpc-method: server.files.copy
      x-transports:
      - http
      - websocket
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                source:
                  type: string
                  description: The source file or directory to copy. This is a path
                    that must start with the root node.
                dest:
                  type: string
                  description: The destination path.  The path must start with the
                    root node.
              required:
              - source
              - dest
            example:
              source: gcodes/my_file.gcode
              dest: gcodes/new_dir/my_file.gcode
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      item:
                        type: object
                        description: A `Destination Item` object.
                      action:
                        type: string
                        description: A description of the action taken.  Expand for
                          details.
              example:
                result:
                  item:
                    root: gcodes
                    path: subdir/my_file.gcode
                    modified: 1676940082.8595376
                    size: 384096
                    permissions: rw
                  action: create_file
        default:
          $ref: '#/components/responses/Error'
  /server/files/zip:
    post:
      summary: Create a ZIP archive
      operationId: postServerFilesZip
      tags:
      - File Manager
      description: Creates a `zip` file consisting of one or more files.
      x-jsonrpc-method: server.files.zip
      x-transports:
      - http
      - websocket
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                dest:
                  type: string
                  description: Path to the destination archive file. The path must
                    begin with a valid "root" that has write permission.
                  default: config/collection-{timestamp}.zip
                items:
                  type: array
                  items:
                    type: string
                  description: An array of paths indicating the items to be included
                    in the archive.  Each path must start with a valid root. An item
                    may be a file or directory.
                store_only:
                  type: boolean
                  description: When set to `true` the contents of the zip archive
                    are not compressed.  Otherwise the `deflation` algorithm will
                    be used to compress the contents.
                  default: false
              required:
              - items
            example:
              dest: config/error_logs.zip
              items:
              - config/printer.cfg
              - logs
              - gcodes/subfolder
              store_only: false
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      destination:
                        type: object
                        description: A `Zip Destination` object containing details
                          about the archived file.
                      action:
                        type: string
                        description: The action taken be the file manager. Will be
                          `zip_files`.
              example:
                result:
                  destination:
                    root: config
                    path: error_logs.zip
                    modified: 1676984423.8892415
                    size: 420
                    permissions: rw
                  action: zip_files
        default:
          $ref: '#/components/responses/Error'
  /server/files/{root}/{filename}:
    get:
      summary: File download
      operationId: getServerFilesRootFilename
      tags:
      - File Manager
      description: |-
        Retrieves file `filename` at root `root`.  The `filename` must include
        the relative path if it is not in the root folder.
      x-transports:
      - http
      parameters:
      - name: root
        in: path
        required: true
        schema:
          type: string
      - name: filename
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Successful operation
        default:
          $ref: '#/components/responses/Error'
    delete:
      summary: File delete
      operationId: deleteServerFilesRootFilename
      tags:
      - File Manager
      description: |-
        Delete a file in the requested root.  If the file exists in a subdirectory,
        its relative path must be part of the `{filename}` argument.
      x-jsonrpc-method: server.files.delete_file
      x-transports:
      - http
      - websocket
      parameters:
      - name: root
        in: path
        required: true
        schema:
          type: string
      - name: filename
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      item:
                        type: object
                        description: A `Deleted Item` object.
                      action:
                        type: string
                        description: Action taken by the file manager. Will always
                          be "delete_file".
              example:
                result:
                  item:
                    path: Lock Body Shim 1mm_0.2mm_FLEX_MK3S_2h30m.gcode
                    root: gcodes
                    size: 0
                    modified: 0
                    permissions: ''
                  action: delete_file
        default:
          $ref: '#/components/responses/Error'
  /server/files/upload:
    post:
      summary: File upload
      operationId: postServerFilesUpload
      tags:
      - File Manager
      description: |-
        Upload a file.  Currently files may be uploaded to the `gcodes` or `config`
        roots, with `gcodes` being the default.  If one wishes to upload
        to a subdirectory, the path may be added to the upload's file name
        (relative to the root). If the directory does not exist an error will be
        returned.  Alternatively, the `path` form argument may be set, as explained
        below.
      x-transports:
      - http
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: The file to upload
                root:
                  type: string
                  description: The root location in which to upload the file.  Currently
                    this may only be `gcodes` or `config`.
                  default: gcodes
                path:
                  type: string
                  description: An optional path, relative to the `root`, indicating
                    a subfolder in which to save the file.  If the subfolder does
                    not exist it will be created.
                checksum:
                  type: string
                  description: An optional SHA256 hex digest calculated by the client
                    for the uploaded file.  If this argument is supplied the server
                    will compare it to its own checksum calculation after the upload
                    has completed.  A checksum mismatch will result in a 422 error.
                print:
                  type: string
                  description: Available only for files uploaded to the `gcodes` root.  When
                    set to `true` Moonraker will command Klippy to start the print
                    after the upload has successfully completed.
                  default: 'false'
              required:
              - file
      responses:
        '201':
          description: File successfully uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  item:
                    type: object
                    description: An `Uploaded Item` object.
                  print_started:
                    type: boolean
                    description: Set to `true` if the uploaded file has successfully
                      started printing.
                  'print_queued ':
                    type: boolean
                    description: Set to `true` if the uploaded file has been queued
                      for printing at a later time.
                  action:
                    type: string
                    description: Action taken by the file manager. Will always be
                      "create_file".
              example:
                item:
                  path: Lock Body Shim 1mm_0.2mm_FLEX_MK3S_2h30m.gcode
                  root: gcodes
                  modified: 1676984527.636818
                  size: 71973
                  permissions: rw
                print_started: false
                print_queued: false
                action: create_file
        default:
          $ref: '#/components/responses/Error'
  /server/files/klippy.log:
