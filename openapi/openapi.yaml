  /server/mqtt/publish:
    post:
      summary: Publish a topic
      operationId: postServerMqttPublish
      tags:
      - Devices
      x-jsonrpc-method: server.mqtt.publish
      x-transports:
      - http
      - websocket
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                topic:
                  type: string
                  description: The topic to publish to the network.
                payload:
                  description: The payload to send with the topic. May be a boolean,
                    float, integer, object, or array.  Objects and Arrays are JSON
                    encoded.  When this parameter is omitted an empty payload is sent.
                  default: null
                qos:
                  type: integer
                  description: The QOS level to use when publishing a topic.  Valid
                    range is 0-2.
                  default: null
                retain:
                  type: boolean
                  description: When set to `true` the topic's retain flag is set.
                  default: false
                timeout:
                  type: number
                  description: A timeout, in seconds, in which Moonraker will wait
                    for acknowledgement from the broker.  If the timeout is exceeded
                    the request will return with a 504 error.  Only applies to QOS
                    levels 1 2. When omitted the request will wait indefinitely.
                  default: null
              required:
              - topic
            example:
              topic: home/test/pub
              payload: hello
              qos: 0
              retain: false
              timeout: 5
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      topic:
                        type: string
                        description: The topic that was successfully published.
              example:
                result:
                  topic: home/test/pub
        default:
          $ref: '#/components/responses/Error'
