                    type: object
                    properties:
                      namespaces:
                        type: array
                        items:
                          type: string
                        description: An array of namespaces registered with the database
                          that may be read by clients.
                      backups:
                        type: array
                        items:
                          type: string
                        description: An array of database backup filenames that have
                          been created.
              example:
                result:
                  namespaces:
                  - gcode_metadata
                  - webcams
                  - update_manager
                  - announcements
                  - database
                  - moonraker
                  backups:
                  - sqldb-backup-20240513-134542.db
                  - testbackup.db
                  - testbackup2.db
        default:
          $ref: '#/components/responses/Error'
  /server/database/item:
    get:
      summary: Get Database Item
      operationId: getServerDatabaseItem
      tags:
      - Database
      description: |-
        Retrieves an item from a specified namespace. The `key` argument may be
        omitted, in which case an object representing the entire namespace will
        be returned in the `value` field.  If the `key` is provided and does not
        exist in the database an error will be returned.
      x-jsonrpc-method: server.database.get_item
      x-transports:
      - http
      - websocket
      parameters:
      - name: namespace
        in: query
        description: The namespace of the item to retrieve.
        required: true
        schema:
          type: string
      - name: key
        in: query
        description: The key indicating the field or fields within the namespace to
          retrieve.  May be a string, where nested fields are separated by a ".",
          or a list of strings. If the key is omitted the entire namespace will be
          returned.
        required: false
        schema:
          type:
          - string
          - 'null'
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      namespace:
                        type: string
                        description: The namespace of the returned item.
                      key:
                        type:
                        - string
                        - 'null'
                        description: The key indicating the requested field(s).
                      value:
                        description: The value of the requested item.  This can be
                          any valid JSON type.
              example:
                result:
                  namespace: moonraker
                  key: file_manager.metadata_version
                  value: 2
        default:
          $ref: '#/components/responses/Error'
    post:
      summary: Add Database Item
      operationId: postServerDatabaseItem
      tags:
      - Database
      description: |-
        Inserts an item into the database.  If the `namespace` does not exist
        it will be created.  If the `key` specifies a nested field, all parents
        will be created if they do not exist.  If the key exists it will be
        overwritten with the provided `value`.  The `key` parameter must be provided,
        as it is not possible to assign a value directly to a namespace.

        **Note:** If the request parameters are placed in the query string and the `value`
        is not a string type, then `value` argument must provide a
        [type hint](./introduction.md#query-string-type-hints).  It is strongly
        recommended to put parameters in the body of the request wrapped in a
        JSON object.
      x-jsonrpc-method: server.database.post_item
      x-transports:
      - http
      - websocket
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                namespace:
                  type: string
                  description: The namespace where the value should be inserted.
                key:
                  type: string
                  description: The key indicating the field or fields where the value
                    should be inserted.
                value:
                  description: The value to insert in the database.  May be any valid
                    JSON type.
              required:
              - namespace
              - key
              - value
            example:
              namespace: my_client
              key: settings.some_count
              value: 100
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      namespace:
                        type: string
                        description: The namespace where the value was inserted.
                      key:
                        type: string
                        description: The key indicating the field or fields where
                          the value was inserted.
                      value:
                        description: The value inserted into the database.  May be
                          any valid JSON type.
              example:
                result:
                  namespace: test
                  key: settings.some_count
                  value: 9001
        default:
          $ref: '#/components/responses/Error'
    delete:
      summary: Delete Database Item
      operationId: deleteServerDatabaseItem
      tags:
      - Database
      description: |-
        Deletes an item from a `namespace` at the specified `key`. If the key does not
        exist in the namespace an error will be returned.  If the deleted item results
        in an empty namespace, the namespace will be removed from the database.
      x-jsonrpc-method: server.database.delete_item
      x-transports:
      - http
      - websocket
      parameters:
      - name: namespace
        in: query
        description: The namespace where the item should be should be removed.
        required: true
        schema:
          type: string
      - name: key
        in: query
        description: The key indicating the field or fields where the item should
          be removed.
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      namespace:
                        type: string
                        description: The namespace containing the item removed.
                      key:
                        type: string
                        description: The key indicating the field or fields where
                          the item was removed.
                      value:
                        description: The of the item at the removed field. May be
                          any valid JSON type.
              example:
                result:
                  namespace: test
                  key: settings.some_count
                  value: 9001
        default:
          $ref: '#/components/responses/Error'
  /server/database/compact:
    post:
      summary: Compact Database
      operationId: postServerDatabaseCompact
      tags:
      - Database
      description: |-
        Compacts and defragments the the sqlite database using the `VACUUM` command.
        This endpoint cannot be requested when Klipper is printing.
      x-jsonrpc-method: server.database.compact
      x-transports:
      - http
