  /server/job_queue/job:
    post:
      summary: Enqueue a job
      operationId: postServerJobqueueJob
      tags:
      - Job Queue
      description: |-
        Adds a job, or an array of jobs, to the end of the job queue.  The same
        filename may be specified multiple times to queue a job that repeats.
        When multiple jobs are specified they will be enqueued in the order they
        are received.

        **Note:** The request will be aborted and return an error if any of the supplied
        files do not exist.

        **Note:** If it isn't possible for your client to pass parameters in the body
        of the request as a json object, they can be added to the query string
        as shown below:

        ```{.http .apirequest title="HTTP Request"}
        POST /server/job_queue/job?filenames=job1.gcode,job2.gcode,subdir/job3.gcode
        ```

        Multiple jobs should be comma separated as shown above.
      x-jsonrpc-method: server.job_queue.post_job
      x-transports:
      - http
      - websocket
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                filenames:
                  type: array
                  items:
                    type: string
                  description: An array of filenames of jobs to add to the queue.
                    The file names should be paths relative to the `gcodes` root.  All
                    of the specified files must exist, otherwise the request will
                    return with an error.
                reset:
                  type: boolean
                  description: When set to `true` the job queue will be cleared prior
                    to adding the requested jobs.
                  default: false
              required:
              - filenames
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      queued_jobs:
                        type: array
                        items:
                          type: object
                          properties:
                            filename:
                              type: string
                            job_id:
                              type: string
                            time_added:
                              type: number
                            time_in_queue:
                              type: number
                      queue_state:
                        type: string
              example:
                result:
                  queued_jobs:
                  - filename: job1.gcode
                    job_id: 0000000066D99C90
                    time_added: 1636151050.7666452
                    time_in_queue: 0.01680004119873
                  - filename: job2.gcode
                    job_id: 0000000066D991F0
                    time_added: 1636151050.7766452
                    time_in_queue: 0.01480004119873
                  - filename: subdir/job3.gcode
                    job_id: 0000000066D99D80
                    time_added: 1636151050.7866452
                    time_in_queue: 0.010680004119873
                  queue_state: ready
        default:
          $ref: '#/components/responses/Error'
    delete:
      summary: Remove a Job
      operationId: deleteServerJobqueueJob
      tags:
      - Job Queue
      description: |-
        Removes one or more jobs from the queue.

        **Note:** Unlike the POST version of this method, it is not necessary that
        all job ids exist.  If any supplied job id does not exist in the
        queue it will be silently ignored.  Clients can verify the contents
        of the queue via the return value.
      x-jsonrpc-method: server.job_queue.delete_job
      x-transports:
      - http
      - websocket
      parameters:
      - name: job_ids
        in: query
        description: An array of `job_ids` to remove from the queue. Any job ids that
          do not exist will be ignored.
        required: true
        schema:
          type: array
          items:
            type: string
      - name: all
        in: query
        description: When set to `true` all jobs will be removed from the queue. In
          this case it is not necessary to set the `job_ids` parameter.
        required: false
        schema:
          type: boolean
          default: false
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      queued_jobs:
                        type: array
                        items:
                          type: object
                          properties:
                            filename:
                              type: string
                            job_id:
                              type: string
                            time_added:
                              type: number
                            time_in_queue:
                              type: number
                      queue_state:
                        type: string
              example:
                result:
                  queued_jobs:
                  - filename: job1.gcode
                    job_id: 0000000066D99C90
                    time_added: 1636151050.7666452
                    time_in_queue: 21.89680004119873
                  queue_state: ready
        default:
          $ref: '#/components/responses/Error'
  /server/job_queue/pause:
    post:
      summary: Pause the job queue
      operationId: postServerJobqueuePause
      tags:
