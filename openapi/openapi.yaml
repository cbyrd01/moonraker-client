                      object
                  minItems: 1
                  maxItems: 1
              required:
              - jsonrpc
              - method
            example:
              jsonrpc: '2.0'
              method: notify_sudo_alert
              params:
              - sudo_requested: true
                sudo_messages:
                - Sudo password required to update Moonraker's systemd service.
      responses:
        '200':
          description: Notification received
