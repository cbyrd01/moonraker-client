                  - name: print_error
                    url: tgram://{bottoken}/{ChatID}
                    events:
                    - error
                    body: '{event_args[1].message}'
                    title: null
                    attach: http://192.168.1.100/webcam/?action=snapshot
        default:
          $ref: '#/components/responses/Error'
  /debug/notifiers/test:
    post:
      summary: Test a notifier (debug)
      operationId: postDebugNotifiersTest
      tags:
      - Integrations
      description: |-
        Forces a registered notifier to push a notification.

        **Note:** This endpoint is only available when Moonraker's debug
        features are enabled and should not be implemented
        in production code
      x-jsonrpc-method: debug.notifiers.test
      x-transports:
      - http
      - websocket
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: The name of the notifier to test.
              required:
              - name
            example:
              name: notifier_name
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      status:
                        type: string
                        description: The status of the test result.  Currently will
                          always be `success`.
                      stats:
                        $ref: '#/components/schemas/PrintStats'
                        description: A [Print Stats](#print-stats-spec) object.
              example:
                result:
                  status: success
                  stats:
                    print_duration: 0.0
                    total_duration: 0.0
                    filament_used: 0.0
                    filename: notifier_test.gcode
                    state: standby
                    message: ''
                    info:
                      total_layer: null
                      current_layer: null
        default:
          $ref: '#/components/responses/Error'
  /server/spoolman/status:
    get:
      summary: Get Spoolman Status
      operationId: getServerSpoolmanStatus
      tags:
      - Integrations
      description: Returns the current status of the spoolman module.
      x-jsonrpc-method: server.spoolman.status
      x-transports:
      - http
      - websocket
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      spoolman_connected:
                        type: boolean
                        description: Indicates that Moonraker has an established websocket
                          connection to Spoolman.
                      pending_reports:
                        type: array
                        items:
                          type: object
                        description: An array of `Pending Spoolman Report` objects.
                          A pending report is a report that has not yet been sent
                          to Spoolman.  This may be because Spoolman is not available
                          or because the current batch of reports are waiting for
                          the internal report timer to schedule them.
                      spool_id:
                        type:
                        - integer
                        - 'null'
                        description: The ID of the currently tracked spool. A value
                          of `null` indicates that no spool ID is set and tracking
                          is disabled.
              example:
                result:
                  spoolman_connected: false
                  pending_reports:
                  - spool_id: 1
                    filament_used: 10
                  spool_id: 2
        default:
          $ref: '#/components/responses/Error'
  /server/spoolman/spool_id:
    post:
      summary: Set active spool
      operationId: postServerSpoolmanSpoolid
      tags:
      - Integrations
      description: |-
        Set the active ID of the spool to track filament usage and report
        to Spoolman.
      x-jsonrpc-method: server.spoolman.post_spool_id
      x-transports:
      - http
      - websocket
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                spool_id:
                  type:
                  - integer
                  - 'null'
                  description: The new active spool ID. A `null` value will unset
                    the previous active spool and disable tracking.
                  default: null
            example:
              spool_id: 1
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      spool_id:
                        type:
                        - integer
                        - 'null'
                        description: The ID of the currently tracked spool. A value
                          of `null` indicates that no spool ID is set and tracking
                          is disabled.
              example:
                result:
                  spool_id: 1
        default:
          $ref: '#/components/responses/Error'
    get:
      summary: Get active spool
      operationId: getServerSpoolmanSpoolid
      tags:
      - Integrations
      description: Retrieve the ID of the spool to which Moonraker reports usage for
        Spoolman.
      x-jsonrpc-method: server.spoolman.get_spool_id
      x-transports:
      - http
      - websocket
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      spool_id:
                        type:
                        - integer
                        - 'null'
                        description: The ID of the currently tracked spool. A value
                          of `null` indicates that no spool ID is set and tracking
                          is disabled.
              example:
                result:
                  spool_id: 1
        default:
          $ref: '#/components/responses/Error'
  /server/spoolman/proxy:
    post:
      summary: Proxy
      operationId: postServerSpoolmanProxy
      tags:
      - Integrations
      description: |-
        Proxy an API request to the Spoolman Server.

        See Spoolman's [OpenAPI Description](https://donkie.github.io/Spoolman/) for
        detailed information about it's API.

        **Note:** The version 2 response has been added to eliminate ambiguity between
        Spoolman errors and Moonraker errors.  With version 1 a frontend
        is not able to reliably to determine if the error is sourced from
        Spoolman or Moonraker.  Version 2 responses will return success
        unless Moonraker is the source of the error.

        The version 2 response is currently opt-in to avoid breaking
        existing implementations, however in the future it will be
        required, at which point the version 1 response will be removed.
        The version 1 response is now deprecated.

        **Note:** Version 1 responses are proxied directly.  See Spoolman's API
        documentation for response specifications.  Errors are also
        proxied directly.
      x-jsonrpc-method: server.spoolman.proxy
      x-transports:
      - http
      - websocket
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                use_v2_response:
                  type: boolean
                  description: When set to `true` the request will return a version
                    2 response.
                  default: false
                request_method:
                  type: string
                  description: The HTTP request method of the API call to proxy.
                path:
                  type: string
                  description: 'The path section of the API endpoint to proxy.  It
                    must include the version, ie: `/v1/filament`'
                query:
                  type: string
                  description: An optional query string component of the URL to proxy.  A
                    `null` value will omit the query string.
                  default: null
                body:
                  type: object
                  description: An optional body containing request parameters for
                    the API call.  This should be a JSON encodable object. A `null`
                    value will send an empty body.
                  default: null
              required:
              - request_method
              - path
            example:
              request_method: POST
              path: /v1/spool
              query: a=1&b=4
              body:
                filament_id: 1
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    $ref: '#/components/schemas/Version2Success'
              example:
                result:
                  response: null
                  error:
                    status_code: 404
                    message: No spool with ID 3 found.
        default:
          $ref: '#/components/responses/Error'
  /server/analysis/status:
    get:
      summary: Get Analysis Status
      operationId: getServerAnalysisStatus
      tags:
      - Integrations
      x-jsonrpc-method: server.analysis.status
      x-transports:
      - http
      - websocket
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      estimator_executable:
                        type: string
                        description: The name of the Klipper Estimator executable
                          file.
                      estimator_ready:
                        type: boolean
                        description: A value of `true` indicates that the Klipper
                          Estimator binary is present and successfully reports its
                          version.
                      estimator_version:
                        type: string
                        description: The version reported by Klipper Estimator.
                      estimator_config_exists:
                        type: boolean
                        description: A value of `true` indicates that a valid Klipper
                          Estimator config file exists.
                      using_default_config:
                        type: boolean
                        description: Reports `true` when Klipper Estimator is configured
                          to use the default config.
              example:
                result:
                  estimator_executable: klipper_estimator_rpi
                  estimator_ready: true
