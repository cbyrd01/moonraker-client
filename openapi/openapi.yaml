  /server/logs/rollover:
    post:
      summary: Rollover Logs
      operationId: postServerLogsRollover
      tags:
      - Server
      description: |-
        Requests a manual rollover for log files registered with Moonraker's
        log management facility.  Currently these are limited to `moonraker.log`
        and `klippy.log`.

        **Note:** Moonraker must be able to manage Klipper's systemd service to
        perform a manual rollover.  The rollover will fail under the following
        conditions:

        - Moonraker cannot detect Klipper's systemd unit
        - Moonraker cannot detect the location of Klipper's files
        - A print is in progress
      x-jsonrpc-method: server.logs.rollover
      x-transports:
      - http
      - websocket
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                application:
                  type: string
                  description: The name of the application for which the log should
                    be rolled over.  Can be `moonraker` or `klipper`.  When no value
                    is specified all logs are rolled over.
                  default: '*all*'
            example:
              application: moonraker
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      rolled_over:
                        type: array
                        items:
                          type: string
                        description: A list of application names successfully rolled
                          over.
                      failed:
                        type: object
                        description: An object where the fields consist of applications
                          names that failed the rollover procedure.  The value assigned
                          to each field is an error message.
              example:
                result:
                  rolled_over:
                  - moonraker
                  - klipper
                  failed: {}
        default:
          $ref: '#/components/responses/Error'
