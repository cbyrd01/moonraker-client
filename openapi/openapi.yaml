      x-transports:
      - http
      - websocket
      parameters:
      - name: objects
        in: query
        description: An object whose key, value pairs represent one or more [Printer
          Object Requests](#printer-obj-req-desc).
        required: true
        schema:
          type: object
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    $ref: '#/components/schemas/ObjectQueryResponse'
              example:
                result: *id001
        default:
          $ref: '#/components/responses/Error'
  /printer/objects/subscribe:
    post:
      summary: Subscribe to printer object status updates
      operationId: printer_objects_subscribe
      tags:
      - Printer
      description: |-
        Requests status updates for a set of printer objects.  A persistent
        connection (Websocket or Unix Socket) is required to fulfill this
        request.

        Status updates for subscribed objects are sent asynchronously over the
        connection.  See the
        [notify_status_update](./jsonrpc_notifications.md#subscription-updates)
        notification for details.

        **Note:** See the [Printer Objects](../printer_objects.md) document
        for details on the objects available for subscription.

        *Transport: JSON-RPC Request (Websocket and Unix Socket Only)*
      x-jsonrpc-method: printer.objects.subscribe
      x-transports:
      - websocket
      x-websocket-only: true
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      eventtime:
                        type: number
                      status:
                        type: object
                        properties:
                          gcode_move:
                            type: object
                            properties:
                              absolute_coordinates:
                                type: boolean
                              absolute_extrude:
                                type: boolean
                              extrude_factor:
                                type: integer
                              gcode_position:
                                type: array
                                items:
                                  type: integer
                              homing_origin:
                                type: array
                                items:
                                  type: integer
                              position:
                                type: array
                                items:
                                  type: integer
                              speed:
                                type: integer
                              speed_factor:
                                type: integer
                          toolhead:
                            type: object
                            properties:
                              position:
                                type: array
                                items:
                                  type: integer
                              status:
                                type: string
              example:
                result:
                  eventtime: 578243.57824499
                  status:
                    gcode_move:
                      absolute_coordinates: true
                      absolute_extrude: true
                      extrude_factor: 1
                      gcode_position:
                      - 0
                      - 0
                      - 0
                      - 0
                      homing_origin:
                      - 0
                      - 0
                      - 0
                      - 0
                      position:
                      - 0
                      - 0
                      - 0
                      - 0
                      speed: 1500
                      speed_factor: 1
                    toolhead:
                      position:
                      - 0
                      - 0
                      - 0
                      - 0
                      status: Ready
        default:
          $ref: '#/components/responses/Error'
