                  - - 39.5
                    - 6.225660195566472
                  - - 39.8
                    - 0.5801244322591914
                  - - 40.1
                    - 0.2925785856185972
        default:
          $ref: '#/components/responses/Error'
  /server/analysis/process:
    post:
      summary: Post process a file
      operationId: postServerAnalysisProcess
      tags:
      - Integrations
      description: |-
        Klipper Estimator will perform a time analysis and use the results to
        modify the time estimates in the file.  If M73 (progress) commands are
        present they will also be modified.

        **Note:** If the `file_manager` has `inotify` enabled the post-process will trigger a
        `create_file` event, which will in turn trigger metadata extraction.
      x-jsonrpc-method: server.analysis.process
      x-transports:
      - http
      - websocket
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                filename:
                  type: string
                  description: The path to the gcode file to post-process. This should
                    be a path relative to the `gcodes` root folder.
                estimator_config:
                  type: string
                  description: The path to a Klipper Estimator config file, relative
                    to the `config` root folder.  When omitted the file configured
                    in the `[analysis]` section of `moonraker.conf` or the default
                    dumped config will be used.
                  default: '**CONFIG_DEFAULT**'
                force:
                  type: boolean
                  description: By default the request will not perform a new post-process
                    if the file was already processed by Klipper Estimator. When `force`
                    is `true` the file will be post-processed regardless.
                  default: false
              required:
              - filename
            example:
              filename: my_file.gcode
              estimator_config: custom_estimator_cfg.json
              force: false
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      prev_processed:
                        type: boolean
                        description: Will be `true` if the requested file was previously
                          processed by Klipper Estimator.
                      version:
                        type: string
                        description: The version of Klipper Estimator used to process
                          the file.
                      bypassed:
                        type: boolean
                        description: Will be `true` if the post-processing was bypassed.  This
                          occurs if the file was previously processed by Klipper Estimator
                          and the `force` argument is `false`.
              example:
                result:
                  prev_processed: false
                  version: v3.7.3
                  bypassed: false
        default:
          $ref: '#/components/responses/Error'
  /server/analysis/dump_config:
    post:
      summary: Dump the current configuration
      operationId: postServerAnalysisDumpconfig
      tags:
      - Integrations
      description: |-
        Create a Klipper Estimator configuration file using Klippy's
        current settings.

        **Note:** Klippy must be connected and in the `ready` state to run
        this request.

        **Note:** The default configuration for Klipper Estimator is stored in the same
        folder as the binary.

        ```
        <data_path>/tools/klipper_estimator/default_estimator_cfg.json
        ```
      x-jsonrpc-method: server.analysis.dump_config
      x-transports:
      - http
      - websocket
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                dest_config:
                  type: string
                  description: The name of the destination config file for the dump.
                    This should be a path relative to the `config` root folder. If
                    omitted the result of the dump will be saved to the default Klipper
                    Estimator configuration file.
                  default: null
            example:
              dest_config: custom_estimator_cfg.json
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      dest_root:
                        type:
                        - string
                        - 'null'
                        description: The destination root folder of the dumped configuration
                          file.  Will be `null` if the dumped file is the default
                          config.
                      dest_config:
                        type: string
                        description: The path of the dumped configuration file relative
                          to the `dest_root`.  If the `dest_root` is null then this
                          will be the default configuration's file name.
                      klipper_estimator_config:
                        type: object
                        description: An object containing the output of the dump command.
              example:
                result:
                  dest_root: config
                  dest_config_path: est_cfg_test.json
                  klipper_estimator_config:
                    max_velocity: 300
                    max_acceleration: 1500
                    minimum_cruise_ratio: 0.5
                    square_corner_velocity: 5
                    instant_corner_velocity: 1
                    move_checkers:
                    - axis_limiter:
                        axis:
                        - 0
                        - 0
                        - 1
                        max_velocity: 15
                        max_accel: 200
                    - extruder_limiter:
                        max_velocity: 120
                        max_accel: 1250
        default:
          $ref: '#/components/responses/Error'
