  /server/connection/identify:
    post:
      summary: Identify Connection
      operationId: server_connection_identify
      tags:
      - Server
      description: |-
        This method provides a way for applications with persistent connections
        to identify themselves to Moonraker.  This information may be used by
        Moonraker perform an action or present information based on if a specific
        type of frontend is connected.  Currently this method is only available
        to websocket and unix socket connections.  Once this endpoint returns
        success it cannot be called again, repeated calls will result in an error.

        **Note:** When identifying as an `agent`, only one instance should be connected
        to Moonraker at a time.  If multiple agents of the same `client_name`
        attempt to identify themselves this endpoint will return an error.
        See the [extensions](./extensions.md) document for more information about
        `agents`.

        **Note:** See the authorization API documentation for details on JWT and API Key authentication.

        *Transport: JSON-RPC request (Websocket/Unix Socket Only)*
      x-jsonrpc-method: server.connection.identify
      x-transports:
      - websocket
      x-websocket-only: true
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                client_name:
                  type: string
                  description: 'The name of the application identifying itself, ie:
                    `Mainsail`, `Fluidd`, `KlipperScreen`, etc.'
                version:
                  type: string
                  description: The version of the application identifying itself.
                type:
                  type: string
                  description: The type of the application.  Expand for available
                    values.
                url:
                  type: string
                  description: The project URL or homepage for the application.
                access_token:
                  type: string
                  description: An optional JSON Web Token used to authenticate the
                    websocket connection.  Only needed when the app uses JWT authentication
                    and did not authenticate through the original Websocket Request.
                  default: null
                api_key:
                  type: string
                  description: An optional API Key used to authenticate the connection.  Only
                    needed when the APP uses API Key authentication and did not authenticate
                    through the original Websocket Request.
                  default: null
              required:
              - client_name
              - version
              - type
              - url
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      connection_id:
                        type: integer
                        description: A unique identifier for this connection.
              example:
                result:
                  connection_id: 1730367696
        default:
          $ref: '#/components/responses/Error'
  /server/websocket/id:
