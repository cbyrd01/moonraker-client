        required: true
        schema:
          type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: object
                    properties:
                      feed:
                        type: string
                        description: The name of the announcement feed removed.
                      action:
                        type: string
